name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: format & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install ruff
        run: pip install ruff

      - name: check formatting
        run: ruff format --check --diff .

      - name: lint
        # advisory only — annotates but does not fail the build
        run: ruff check . || true

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: install
        run: pip install -e ".[dev]"

      - name: pytest
        run: pytest --cov=wsjtx_codec --cov-report=term-missing
